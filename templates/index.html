<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gate AI Quant</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<main>
  <header>
    <h1>Gate AI Quant</h1>
    <p>公开行情分析与无前视回测。不会连接账户，也不会自动下单。</p>
  </header>

  <section class="card">
    <h2>实时信号</h2>
    <div class="grid">
      <label>交易对<input id="contract" value="BTC_USDT"></label>
      <label>周期<select id="interval">
        <option>5m</option><option selected>15m</option><option>30m</option>
        <option>1h</option><option>4h</option>
      </select></label>
    </div>
    <button id="analyzeBtn">分析已收盘K线</button>
    <pre id="analysis">等待分析</pre>
  </section>

  <section class="card">
    <h2>历史回测</h2>
    <div class="grid">
      <label>开始日期<input id="start" type="date" value="2026-01-01"></label>
      <label>结束日期<input id="end" type="date" value="2026-03-31"></label>
      <label>信号阈值<input id="threshold" type="number" value="72" min="60" max="90"></label>
      <label>单边手续费<input id="fee" type="number" step="0.0001" value="0.0005"></label>
      <label>单边滑点<input id="slippage" type="number" step="0.0001" value="0.0002"></label>
      <label>每笔风险比例<input id="risk" type="number" step="0.005" value="0.01"></label>
    </div>
    <button id="backtestBtn">开始回测</button>
    <p class="note">5分钟三个月约2.6万根K线，接近本版本单次安全上限。建议先用15分钟或缩短日期。</p>
    <pre id="backtest">等待回测</pre>
  </section>

  <section class="card warning">
    <h2>结果解释</h2>
    <p>回测不是盈利承诺。先查看交易笔数、最大回撤、Profit Factor和样本外表现，不要只看胜率。</p>
  </section>
</main>
<script src="/static/app.js"></script>
</body>
</html>
